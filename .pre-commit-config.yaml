repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.3
    hooks:
      - id: ruff
        args: [ --fix ]
        files: ^backend/

  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend ESLint
        entry: cmd.exe /c "cd frontend && npm run lint"
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false